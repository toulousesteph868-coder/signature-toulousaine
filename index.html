<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Signature Toulousaine</title>
    <style>
        :root { --main-pink: #FF7F7F; --bg-cream: #FFF9E7; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-cream); color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--main-pink); font-style: italic; font-size: 3rem; margin: 0; }
        .table-container { width: 100%; max-width: 1000px; overflow-x: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        table { border-collapse: separate; border-spacing: 4px; width: 100%; min-width: 800px; }
        th { background-color: #fcfcfc; padding: 15px 10px; border-bottom: 2px solid var(--main-pink); position: sticky; top: 0; }
        td { border: 1px solid #eee; text-align: center; padding: 10px 5px; border-radius: 4px; font-size: 0.85rem; transition: all 0.2s ease; }
        .time-col { font-weight: bold; background: #fafafa; width: 80px; }
        .available { background-color: #f0fff4; color: #2f855a; cursor: pointer; }
        .available:hover { background-color: var(--main-pink) !important; color: white; }
        .selected { background-color: var(--main-pink) !important; color: white; font-weight: bold; }
        .closed { background-color: #fafafa; color: #ddd; cursor: not-allowed; }

        #booking-form { display: none; margin-top: 30px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 5px solid var(--main-pink); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: var(--main-pink); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Signature Toulousaine</h1>
        <div style="font-weight:bold; margin-top:10px;">Snapchat : @masseurtlse31</div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr id="headerRow"><th class="time-col">Heures</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <form id="booking-form" action=" https://formspree.io/f/mqeybjjy " method="POST">
        <h3 style="margin-top:0">Demande de réservation</h3>
        
        <input type="hidden" name="Jour" id="hidden-jour">
        <input type="hidden" name="Heure" id="hidden-heure">
        
        <p id="selection-summary" style="color: var(--main-pink); font-weight:bold;"></p>
        
        <input type="text" name="Nom" placeholder="Votre Nom / Pseudo" required>
        <input type="text" name="Contact" placeholder="Votre Snapchat ou Téléphone" required>
        <button type="submit">Envoyer la demande</button>
    </form>

    <script>
        const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
        const tableBody = document.getElementById('tableBody');
        const bookingForm = document.getElementById('booking-form');

        jours.forEach(j => {
            let th = document.createElement('th');
            th.innerText = j;
            document.getElementById('headerRow').appendChild(th);
        });

        for (let h = 8; h <= 25.5; h += 0.5) {
            let hInt = Math.floor(h);
            let m = (h % 1 === 0) ? "00" : "30";
            let displayH = hInt >= 24 ? hInt - 24 : hInt;
            let timeStr = `${displayH.toString().padStart(2, '0')}h${m}`;
            let tr = document.createElement('tr');
            let timeTd = document.createElement('td');
            timeTd.className = "time-col";
            timeTd.innerText = timeStr;
            tr.appendChild(timeTd);

            jours.forEach((jour, idx) => {
                let td = document.createElement('td');
                let isAvail = (idx < 5) ? (h >= 18.5 && h < 24) : ((h >= 8.5 && h < 15) || (h >= 23 && h <= 25.5));

                if (isAvail) {
                    td.className = "available";
                    td.innerText = "Libre";
                    td.onclick = function() {
                        document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                        bookingForm.style.display = 'block';
                        document.getElementById('hidden-jour').value = jour;
                        document.getElementById('hidden-heure').value = timeStr;
                        document.getElementById('selection-summary').innerText = `Sélection : ${jour} à ${timeStr}`;
                        bookingForm.scrollIntoView({ behavior: 'smooth' });
                    };
                } else {
                    td.className = "closed"; td.innerText = "-";
                }
                tr.appendChild(td);
            });
            tableBody.appendChild(tr);
        }
    </script>
</body>
</html>
